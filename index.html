<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS // Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00f0ff;
            --magenta: #ff2bd6;
            --violet: #8b5cf6;
            --green: #39ff14;
            --bg-0: #05060f;
            --bg-1: #0a0e1f;
            --panel: rgba(15, 20, 40, 0.55);
            --border: rgba(0, 240, 255, 0.35);
            --text: #e6f7ff;
            --muted: #8a9bbd;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            color: var(--text);
            background: var(--bg-0);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Animated nebula background */
        body::before {
            content: '';
            position: fixed;
            inset: -50%;
            background:
                radial-gradient(circle at 20% 30%, rgba(0, 240, 255, 0.25), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 43, 214, 0.22), transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(139, 92, 246, 0.18), transparent 55%);
            animation: drift 18s ease-in-out infinite alternate;
            z-index: 0;
        }

        /* Grid floor */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 240, 255, 0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.06) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
            z-index: 0;
            pointer-events: none;
        }

        @keyframes drift {
            0%   { transform: translate(0, 0) scale(1); }
            50%  { transform: translate(3%, -2%) scale(1.05); }
            100% { transform: translate(-2%, 2%) scale(1); }
        }

        .container {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
        }

        .card {
            position: relative;
            background: var(--panel);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            box-shadow:
                0 0 0 1px rgba(0, 240, 255, 0.08) inset,
                0 0 40px rgba(0, 240, 255, 0.18),
                0 30px 80px rgba(0, 0, 0, 0.6);
        }

        /* Neon corner accents */
        .card::before, .card::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            border-color: var(--cyan);
            border-style: solid;
            pointer-events: none;
        }
        .card::before {
            top: -1px; left: -1px;
            border-width: 2px 0 0 2px;
            border-top-left-radius: 20px;
            box-shadow: -2px -2px 12px rgba(0, 240, 255, 0.6);
        }
        .card::after {
            bottom: -1px; right: -1px;
            border-width: 0 2px 2px 0;
            border-bottom-right-radius: 20px;
            box-shadow: 2px 2px 12px rgba(255, 43, 214, 0.6);
            border-color: var(--magenta);
        }

        h1 {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 6px;
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(90deg, var(--cyan), var(--magenta));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-transform: uppercase;
            text-shadow: 0 0 30px rgba(0, 240, 255, 0.35);
        }

        h1 .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--green);
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 10px var(--green), 0 0 20px var(--green);
            animation: pulse 1.4s ease-in-out infinite;
            vertical-align: middle;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.35; }
        }

        /* Calculator display */
        .display {
            width: 100%;
            min-height: 90px;
            background: linear-gradient(180deg, rgba(0, 8, 24, 0.9), rgba(0, 4, 12, 0.95));
            border: 1px solid rgba(0, 240, 255, 0.3);
            color: var(--cyan);
            font-family: 'Share Tech Mono', monospace;
            font-size: 36px;
            text-align: right;
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 18px;
            overflow: hidden;
            word-wrap: break-word;
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.7), 0 0 18px rgba(0, 240, 255, 0.35);
            position: relative;
            box-shadow:
                0 0 25px rgba(0, 240, 255, 0.18) inset,
                0 0 20px rgba(0, 240, 255, 0.15);
        }

        /* Scanline */
        .display::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(255, 255, 255, 0.02) 0px,
                rgba(255, 255, 255, 0.02) 1px,
                transparent 1px,
                transparent 3px
            );
            pointer-events: none;
            border-radius: 12px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .btn {
            padding: 16px;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: 600;
            border: 1px solid rgba(0, 240, 255, 0.25);
            border-radius: 10px;
            background: rgba(0, 240, 255, 0.05);
            color: var(--text);
            cursor: pointer;
            transition: all 0.18s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 1px;
        }

        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, transparent, rgba(0, 240, 255, 0.18), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }

        .btn:hover {
            background: rgba(0, 240, 255, 0.15);
            border-color: var(--cyan);
            box-shadow: 0 0 18px rgba(0, 240, 255, 0.45);
            color: var(--cyan);
            text-shadow: 0 0 6px rgba(0, 240, 255, 0.8);
        }

        .btn:hover::before {
            transform: translateX(100%);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn.op {
            border-color: rgba(255, 43, 214, 0.5);
            background: rgba(255, 43, 214, 0.08);
            color: var(--magenta);
            text-shadow: 0 0 6px rgba(255, 43, 214, 0.5);
        }

        .btn.op:hover {
            background: rgba(255, 43, 214, 0.18);
            border-color: var(--magenta);
            box-shadow: 0 0 18px rgba(255, 43, 214, 0.55);
            color: #fff;
        }

        .btn.equals {
            grid-column: span 2;
            border-color: rgba(57, 255, 20, 0.5);
            background: rgba(57, 255, 20, 0.1);
            color: var(--green);
            text-shadow: 0 0 6px rgba(57, 255, 20, 0.6);
        }

        .btn.equals:hover {
            background: rgba(57, 255, 20, 0.2);
            border-color: var(--green);
            box-shadow: 0 0 22px rgba(57, 255, 20, 0.6);
            color: #fff;
        }

        .btn.clear {
            border-color: rgba(255, 50, 80, 0.55);
            background: rgba(255, 50, 80, 0.08);
            color: #ff5577;
            text-shadow: 0 0 6px rgba(255, 50, 80, 0.5);
        }

        .btn.clear:hover {
            background: rgba(255, 50, 80, 0.18);
            border-color: #ff5577;
            box-shadow: 0 0 18px rgba(255, 50, 80, 0.55);
            color: #fff;
        }

        /* Modal */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(2, 4, 12, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10;
            padding: 20px;
            animation: fadeIn 0.2s ease;
        }

        .overlay.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            position: relative;
            background: linear-gradient(180deg, rgba(15, 20, 40, 0.92), rgba(8, 12, 28, 0.92));
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 30px;
            max-width: 440px;
            width: 100%;
            box-shadow:
                0 0 0 1px rgba(0, 240, 255, 0.1) inset,
                0 0 50px rgba(0, 240, 255, 0.25),
                0 30px 80px rgba(0, 0, 0, 0.7);
            animation: modalIn 0.3s cubic-bezier(.2,.8,.2,1);
        }

        @keyframes modalIn {
            from { transform: translateY(20px) scale(0.96); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        .modal::before, .modal::after {
            content: '';
            position: absolute;
            width: 26px;
            height: 26px;
            border-style: solid;
            pointer-events: none;
        }
        .modal::before {
            top: -1px; left: -1px;
            border-width: 2px 0 0 2px;
            border-color: var(--cyan);
            border-top-left-radius: 18px;
            box-shadow: -2px -2px 14px rgba(0, 240, 255, 0.6);
        }
        .modal::after {
            bottom: -1px; right: -1px;
            border-width: 0 2px 2px 0;
            border-color: var(--magenta);
            border-bottom-right-radius: 18px;
            box-shadow: 2px 2px 14px rgba(255, 43, 214, 0.6);
        }

        .close-btn {
            position: absolute;
            top: 14px;
            right: 14px;
            width: 34px;
            height: 34px;
            border: 1px solid rgba(0, 240, 255, 0.3);
            background: rgba(0, 240, 255, 0.06);
            color: var(--cyan);
            border-radius: 50%;
            font-size: 20px;
            font-family: 'Orbitron', sans-serif;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.18s ease;
            z-index: 1;
        }

        .close-btn:hover {
            background: rgba(255, 50, 80, 0.2);
            border-color: #ff5577;
            color: #ff5577;
            box-shadow: 0 0 16px rgba(255, 50, 80, 0.6);
            transform: rotate(90deg);
        }

        .modal h2 {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 4px;
            margin-bottom: 6px;
            text-transform: uppercase;
            background: linear-gradient(90deg, var(--cyan), var(--magenta));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .modal .subtitle {
            color: var(--muted);
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            letter-spacing: 0.5px;
            margin-bottom: 22px;
            border-left: 2px solid var(--cyan);
            padding-left: 10px;
        }

        .field {
            margin-bottom: 14px;
        }

        .field label {
            display: block;
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            color: var(--cyan);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .field input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid rgba(0, 240, 255, 0.25);
            background: rgba(0, 8, 24, 0.6);
            color: var(--text);
            border-radius: 8px;
            font-size: 15px;
            font-family: 'Share Tech Mono', monospace;
            letter-spacing: 1px;
            transition: all 0.18s ease;
        }

        .field input::placeholder {
            color: rgba(138, 155, 189, 0.5);
        }

        .field input:focus {
            outline: none;
            border-color: var(--cyan);
            box-shadow: 0 0 0 3px rgba(0, 240, 255, 0.15), 0 0 18px rgba(0, 240, 255, 0.25) inset;
            background: rgba(0, 12, 32, 0.8);
        }

        .row {
            display: flex;
            gap: 12px;
        }

        .row .field {
            flex: 1;
        }

        .pay-btn {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--cyan);
            border-radius: 10px;
            background: linear-gradient(90deg, rgba(0, 240, 255, 0.18), rgba(255, 43, 214, 0.18));
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .pay-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.25), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .pay-btn:hover {
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.55), 0 0 60px rgba(255, 43, 214, 0.35);
            border-color: var(--magenta);
        }

        .pay-btn:hover::before {
            transform: translateX(100%);
        }

        .pay-btn:active {
            transform: scale(0.98);
        }

        .error {
            color: #ff5577;
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            letter-spacing: 1px;
            margin-top: 4px;
            display: none;
            text-shadow: 0 0 6px rgba(255, 50, 80, 0.5);
        }

        .error.show {
            display: block;
        }

        .error::before {
            content: '> ';
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1><span class="dot"></span>Nexus // Calc</h1>
            <div id="display" class="display">0</div>
            <div class="buttons">
                <button class="btn clear" data-action="clear">AC</button>
                <button class="btn" data-action="backspace">DEL</button>
                <button class="btn op" data-value="%">%</button>
                <button class="btn op" data-value="/">÷</button>

                <button class="btn" data-value="7">7</button>
                <button class="btn" data-value="8">8</button>
                <button class="btn" data-value="9">9</button>
                <button class="btn op" data-value="*">×</button>

                <button class="btn" data-value="4">4</button>
                <button class="btn" data-value="5">5</button>
                <button class="btn" data-value="6">6</button>
                <button class="btn op" data-value="-">−</button>

                <button class="btn" data-value="1">1</button>
                <button class="btn" data-value="2">2</button>
                <button class="btn" data-value="3">3</button>
                <button class="btn op" data-value="+">+</button>

                <button class="btn" data-value="0">0</button>
                <button class="btn" data-value=".">.</button>
                <button class="btn equals" data-action="equals">=</button>
            </div>
        </div>
    </div>

    <div id="overlay" class="overlay">
        <div class="modal">
            <button type="button" class="close-btn" id="close-payment" aria-label="Close">&times;</button>
            <h2>Auth // Payment</h2>
            <p class="subtitle">Verify credentials to decrypt result</p>
            <form id="payment-form" autocomplete="off">
                <div class="field">
                    <label for="cc-number">Card Number</label>
                    <input type="text" id="cc-number" placeholder="1234 5678 9012 3456" inputmode="numeric" maxlength="19" required>
                    <div class="error" id="err-number">Enter a valid card number</div>
                </div>
                <div class="field">
                    <label for="cc-name">Name on Card</label>
                    <input type="text" id="cc-name" placeholder="John Doe" required>
                    <div class="error" id="err-name">Enter the name on the card</div>
                </div>
                <div class="row">
                    <div class="field">
                        <label for="cc-exp">Expiration</label>
                        <input type="text" id="cc-exp" placeholder="MM/YY" maxlength="5" required>
                        <div class="error" id="err-exp">Enter MM/YY</div>
                    </div>
                    <div class="field">
                        <label for="cc-cvv">CVV</label>
                        <input type="text" id="cc-cvv" placeholder="123" inputmode="numeric" maxlength="4" required>
                        <div class="error" id="err-cvv">Enter CVV</div>
                    </div>
                </div>
                <button type="submit" class="pay-btn">// Pay Now</button>
            </form>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        const overlay = document.getElementById('overlay');
        const paymentForm = document.getElementById('payment-form');

        let expression = '';
        let pendingAnswer = null;
        let justEvaluated = false;

        function render() {
            display.textContent = expression || '0';
        }

        function append(value) {
            if (justEvaluated) {
                if (/[0-9.]/.test(value)) {
                    expression = '';
                }
                justEvaluated = false;
            }
            expression += value;
            render();
        }

        function clearAll() {
            expression = '';
            justEvaluated = false;
            render();
        }

        function backspace() {
            expression = expression.slice(0, -1);
            render();
        }

        function compute(expr) {
            const sanitized = expr.replace(/[^0-9+\-*/%.() ]/g, '');
            if (!sanitized) return null;
            try {
                const result = Function('"use strict"; return (' + sanitized + ')')();
                if (result === undefined || Number.isNaN(result) || !Number.isFinite(result)) {
                    return 'Error';
                }
                return Math.round(result * 1e10) / 1e10;
            } catch (e) {
                return 'Error';
            }
        }

        function requestEquals() {
            if (!expression) return;
            const result = compute(expression);
            if (result === null) return;
            pendingAnswer = result;
            openPayment();
        }

        function openPayment() {
            overlay.classList.add('active');
            document.getElementById('cc-number').focus();
        }

        function closePayment() {
            overlay.classList.remove('active');
            paymentForm.reset();
            ['err-number', 'err-name', 'err-exp', 'err-cvv'].forEach(id => showError(id, false));
        }

        document.getElementById('close-payment').addEventListener('click', closePayment);
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) closePayment();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && overlay.classList.contains('active')) {
                closePayment();
            }
        });

        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const action = btn.dataset.action;
                const value = btn.dataset.value;
                if (action === 'clear') clearAll();
                else if (action === 'backspace') backspace();
                else if (action === 'equals') requestEquals();
                else if (value !== undefined) append(value);
            });
        });

        document.addEventListener('keydown', (e) => {
            if (overlay.classList.contains('active')) return;
            if (e.key === 'Enter' || e.key === '=') {
                e.preventDefault();
                requestEquals();
            } else if (e.key === 'Backspace') {
                backspace();
            } else if (e.key === 'Escape' || e.key.toLowerCase() === 'c') {
                clearAll();
            } else if (/^[0-9+\-*/%.]$/.test(e.key)) {
                append(e.key);
            }
        });

        // Credit card field formatting
        const ccNumber = document.getElementById('cc-number');
        ccNumber.addEventListener('input', () => {
            let v = ccNumber.value.replace(/\D/g, '').slice(0, 16);
            ccNumber.value = v.replace(/(.{4})/g, '$1 ').trim();
        });

        const ccExp = document.getElementById('cc-exp');
        ccExp.addEventListener('input', () => {
            let v = ccExp.value.replace(/\D/g, '').slice(0, 4);
            if (v.length >= 3) v = v.slice(0, 2) + '/' + v.slice(2);
            ccExp.value = v;
        });

        const ccCvv = document.getElementById('cc-cvv');
        ccCvv.addEventListener('input', () => {
            ccCvv.value = ccCvv.value.replace(/\D/g, '').slice(0, 4);
        });

        function showError(id, show) {
            document.getElementById(id).classList.toggle('show', show);
        }

        paymentForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const numDigits = ccNumber.value.replace(/\D/g, '');
            const name = document.getElementById('cc-name').value.trim();
            const exp = ccExp.value;
            const cvv = ccCvv.value;

            let ok = true;
            if (numDigits.length < 12) { showError('err-number', true); ok = false; } else showError('err-number', false);
            if (!name) { showError('err-name', true); ok = false; } else showError('err-name', false);
            if (!/^\d{2}\/\d{2}$/.test(exp)) { showError('err-exp', true); ok = false; } else showError('err-exp', false);
            if (cvv.length < 3) { showError('err-cvv', true); ok = false; } else showError('err-cvv', false);

            if (!ok) return;

            // Any card is accepted — reveal the answer
            closePayment();
            expression = String(pendingAnswer);
            justEvaluated = true;
            render();
        });
    </script>
</body>
</html>
